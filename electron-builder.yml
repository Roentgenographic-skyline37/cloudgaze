appId: com.cloudgaze.app
productName: CloudGaze
directories:
  output: dist-app
  buildResources: build
files:
  - out/**/*
  - package.json
# Ad-hoc sign the macOS app (no Apple Developer ID); without a valid signature
# arm64 macOS reports the app as "damaged". No-op on Windows/Linux.
afterPack: build/afterPack.cjs
win:
  target:
    - portable
    - nsis
# Artifact names are intentionally VERSION-LESS so that stable
# https://github.com/.../releases/latest/download/<name> URLs in the README
# always resolve to the newest build. Each Windows target needs its own name —
# both emit .exe, so a shared artifactName would collide. (${target} is not a
# valid electron-builder macro.)
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-Windows-${arch}.${ext}
portable:
  artifactName: ${productName}-Windows-Portable-${arch}.${ext}
mac:
  # Build separate x64 and arm64 dmgs so both Intel and Apple Silicon Macs are
  # covered (more robust than a universal lipo merge, which this pure-JS app
  # doesn't need).
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  artifactName: ${productName}-macOS-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: CloudGaze contributors
  artifactName: ${productName}-Linux-${arch}.${ext}
