appId: com.cloudgaze.app
productName: CloudGaze
directories:
  output: dist-app
  buildResources: build
files:
  - out/**/*
  - package.json
win:
  target:
    - portable
    - nsis
# Each Windows target needs its own name — both emit .exe, so a shared
# artifactName would collide. (${target} is not a valid electron-builder macro.)
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-windows-setup.${ext}
portable:
  artifactName: ${productName}-${version}-windows-portable.${ext}
mac:
  # Build separate x64 and arm64 dmgs so both Intel and Apple Silicon Macs are
  # covered (more robust than a universal lipo merge, which this pure-JS app
  # doesn't need).
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: CloudGaze contributors
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
