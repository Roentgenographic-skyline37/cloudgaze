name: Release

# Build CloudGaze for Windows, macOS, and Linux on every v* tag and attach the
# bundles to the GitHub Release. electron-builder can't cross-build macOS from
# other OSes, so each platform builds on its own native runner; a final job
# collects every platform's artifacts into one Release (no concurrent-release
# races).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # No `cache: npm` — that requires a committed lockfile, which we
      # deliberately don't have (see the npm install step below).
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # No package-lock.json is committed (see .gitignore): npm records only the
      # host platform's optional Rollup native binary, so a lockfile made on one
      # OS breaks installs on the others (npm/cli#4828). Each runner resolves its
      # own @rollup/rollup-<platform> here so electron-vite/Rollup can build.
      - run: npm install --no-audit --no-fund

      - run: npm run typecheck

      - name: Build + package
        run: npm run dist:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple signing certs in CI — don't let electron-builder fail the
          # macOS build hunting for an identity; ship an unsigned dmg.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload platform bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: |
            dist-app/*.exe
            dist-app/*.dmg
            dist-app/*.AppImage
            dist-app/*.deb
          if-no-files-found: warn

  release:
    needs: build
    # Run even if a platform failed, so a single finicky OS can't sink the whole
    # release — publish whatever built. `fail_on_unmatched_files` still fails the
    # job (no empty release) if *nothing* built.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles

      - name: List downloaded bundles
        run: find bundles -type f -printf '%P\t%s bytes\n' || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bundles/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
