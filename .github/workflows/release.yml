name: Release

# Build CloudGaze for Windows, macOS, and Linux on every v* tag and attach the
# bundles to the GitHub Release. electron-builder can't cross-build macOS from
# other OSes, so each platform builds on its own native runner; a final job
# collects every platform's artifacts into one Release (no concurrent-release
# races).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - name: Build + package
        run: npm run dist:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload platform bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: |
            dist-app/*.exe
            dist-app/*.dmg
            dist-app/*.AppImage
            dist-app/*.deb
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bundles/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
