  // deterministic RNG so frames are reproducible
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function series(seed, n, base, amp, drift, spike){
    const rnd = mulberry32(seed); const out=[]; let v=base;
    for(let i=0;i<n;i++){ v += (rnd()-0.5)*amp + drift; if(spike && rnd()>0.86) v += amp*1.6*rnd();
      v = Math.max(base*0.15, v); out.push(v); }
    return out;
  }

    });
  })();

  // stat tiles (values animated via count-up)
  const TILES = [
    { label:'Resources deployed', target:448, sub:'in us-east-1', tone:'accent' },
    { label:'Services in use', target:8, sub:'with ≥ 1 resource', tone:'neutral' },
    { label:'Services scanned', target:35, sub:'', tone:'neutral' },
    { label:'No access', target:2, sub:'permission or region gaps', tone:'warn' }
  ];
  (function(){
    const wrap = document.getElementById('tiles');
    TILES.forEach((t,i)=>{
      const c = el('div','rounded-xl border border-border bg-surface shadow-card p-4');
      c.innerHTML = `<div class="flex items-center justify-between">
          <span class="text-xs font-medium uppercase tracking-wide text-fg-subtle">${t.label}</span></div>
        <div class="mt-2 text-2xl font-semibold tabular-nums ${TONE_TEXT[t.tone]}" data-tile="${i}">0</div>
        ${t.sub?`<div class="mt-1 text-xs text-fg-muted">${t.sub}</div>`:''}`;
      wrap.appendChild(c);
    });
  })();

  // sparkline svg from points
  function sparkSVG(m){
    const W=300,H=78, pad=4;
    const xs = m.pts, n=xs.length, min=Math.min(...xs), max=Math.max(...xs), span=(max-min)||1;
    const X=i=> pad + i*(W-2*pad)/(n-1);
    const Y=v=> pad + (H-2*pad)*(1-(v-min)/span);
    let line='', area='';
    xs.forEach((v,i)=>{ const x=X(i).toFixed(1), y=Y(v).toFixed(1); line += (i?'L':'M')+x+' '+y+' '; });
    area = line + `L ${X(n-1).toFixed(1)} ${H} L ${X(0).toFixed(1)} ${H} Z`;
    const gid = 'grad'+Math.random().toString(36).slice(2,8);
    // faint horizontal gridlines to evoke CartesianGrid
    let grid='';
    for(let k=1;k<=2;k++){ const y=(pad+(H-2*pad)*k/3).toFixed(1); grid+=`<line x1="0" x2="${W}" y1="${y}" y2="${y}" stroke="rgb(var(--border))" stroke-dasharray="3 3"/>`; }
    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="100%">
      <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${m.color}" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="${m.color}" stop-opacity="0"/></linearGradient></defs>
      ${grid}
      <path class="spark-area" d="${area}" fill="url(#${gid})" opacity="0"/>
      <path class="spark-line" d="${line}" stroke="${m.color}"/>
    </svg>`;
  }

  function badge(text, tone){ return `<span class="inline-flex items-center gap-1 whitespace-nowrap rounded-full border px-2 py-0.5 text-xs font-medium ${TONE_BADGE[tone]}">${text}</span>`; }

  function table(sec){
    const cols = sec.cols.map(c => Array.isArray(c)?c:[c,'left']);
    let head = cols.map(([h,a])=>`<th class="px-3 py-2 font-medium ${a==='right'?'text-right':''}">${h}</th>`).join('');
    let body = sec.rows.map(r=>{
      const tds = r.map((cell,ci)=>{
        const align = cols[ci][1]==='right'?'text-right tabular-nums':'';
        let inner;
        if(Array.isArray(cell)) inner = badge(cell[0], cell[1]);
        else if(ci===0) inner = `<span class="font-medium text-fg">${cell}</span>`;
        else inner = cell;
        return `<td class="px-3 py-1.5 align-top text-fg-muted ${align}">${inner}</td>`;
      }).join('');
      return `<tr class="border-b border-border/60">${tds}</tr>`;
    }).join('');
    return `<div class="overflow-hidden"><table class="w-full border-collapse text-sm">
      <thead><tr class="border-b border-border text-left text-xs uppercase tracking-wide text-fg-subtle">${head}</tr></thead>
      <tbody>${body}</tbody></table></div>`;
  }

  function sectionEl(sec){
    const card = el('div','rounded-xl border border-border bg-surface shadow-card overflow-hidden');
    const breakdown = (sec.breakdown&&sec.breakdown.length)
      ? `<div class="hidden flex-wrap gap-x-3 gap-y-1 md:flex">${sec.breakdown.slice(0,4).map(b=>
          `<span class="inline-flex items-center gap-1.5 text-xs text-fg-muted"><span class="h-2 w-2 rounded-full ${TONE_DOT[b.tone]}"></span><span class="tabular-nums font-medium text-fg">${b.count}</span><span>${b.label}</span></span>`).join('')}</div>`
      : '';
    const metricsBlock = sec.metrics.length ? `
      <div>
        <h3 class="mb-2 flex items-center gap-1.5 text-[11px] font-semibold uppercase tracking-wide text-fg-subtle">
          Headline metrics <span class="text-fg-subtle/70">· across all ${sec.noun}</span></h3>
        <div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-4">
          ${sec.metrics.map(m=>`
            <section class="rounded-xl border border-border bg-surface shadow-card">
              <header class="border-b border-border px-4 py-2.5"><h2 class="truncate text-sm font-semibold text-fg">${m.label}</h2></header>
              <div class="px-4 pb-3 pt-3"><div style="width:100%;height:78px">${sparkSVG(m)}</div></div>
            </section>`).join('')}
        </div>
      </div>` : '';
    card.innerHTML = `
      <div class="flex items-center gap-3 px-4 py-3">
        <div class="flex min-w-0 flex-1 items-center gap-3 text-left">
          ${icon('ChevronDown','h-4 w-4 shrink-0 text-fg-subtle')}
          <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-accent-soft text-accent">${icon(sec.icon,'h-4 w-4')}</div>
          <div class="min-w-0">
            <div class="truncate text-sm font-semibold text-fg">${sec.label}</div>
            <div class="text-xs text-fg-subtle">${sec.category}</div>
          </div>
        </div>
        ${breakdown}
        <span class="ml-2 whitespace-nowrap text-fg"><span class="text-lg font-semibold tabular-nums">${sec.count}</span><span class="ml-1 text-xs text-fg-subtle">${sec.noun}</span></span>
        <div class="rounded-lg border border-border bg-surface-2 p-1.5 text-fg-muted">${icon('ArrowUpRight','h-4 w-4')}</div>
      </div>
      <div class="space-y-4 border-t border-border p-4">
        ${metricsBlock}
        ${table(sec)}
      </div>`;
    return card;
  }
  (function(){ const wrap=document.getElementById('sections'); SECTIONS.forEach(s=>wrap.appendChild(sectionEl(s))); })();

  // drawer (Lambda detail)
  document.getElementById('drawer').innerHTML = `
    <div class="flex h-14 items-center justify-between border-b border-border px-4">
      <div class="flex items-center gap-2 min-w-0">
        <div class="flex h-7 w-7 items-center justify-center rounded-lg bg-accent-soft text-accent">${icon('Zap','h-4 w-4')}</div>
        <div class="min-w-0"><div class="truncate text-sm font-semibold text-fg">checkout-api-prod</div>
          <div class="text-[11px] text-fg-subtle">Lambda function</div></div>
      </div>
      ${icon('X','h-4 w-4 text-fg-subtle')}
    </div>
    <div class="space-y-4 p-4">
      <div class="flex gap-2">
        <div class="inline-flex items-center gap-1 rounded-lg border border-border bg-accent-soft px-2.5 py-1 text-xs font-medium text-accent">Details</div>
        <div class="inline-flex items-center gap-1 rounded-lg px-2.5 py-1 text-xs text-fg-subtle">Raw JSON</div>
      </div>
      <div>
        <div class="mb-1.5 text-[11px] font-semibold uppercase tracking-wide text-fg-subtle">Configuration</div>
        <div class="rounded-xl border border-border bg-surface">
          ${[['Runtime','nodejs20.x'],['Handler','index.handler'],['Memory','512 MB'],['Timeout','30 s'],['Architecture','arm64'],['Last modified','2 days ago']]
            .map((r,i)=>`<div class="flex items-center justify-between px-3 py-2 ${i?'border-t border-border/60':''}">
              <span class="text-xs text-fg-subtle">${r[0]}</span><span class="text-xs font-medium text-fg tabular-nums">${r[1]}</span></div>`).join('')}
        </div>
      </div>
      <div>
        <div class="mb-1.5 text-[11px] font-semibold uppercase tracking-wide text-fg-subtle">Invocations · 24h</div>
        <section class="rounded-xl border border-border bg-surface"><div class="px-3 py-3"><div style="width:100%;height:90px">${sparkSVG(metric('Invocations','count','accent', series(99,40,4200,900,40,true)))}</div></div></section>
      </div>
      <div>
        <div class="mb-1.5 text-[11px] font-semibold uppercase tracking-wide text-fg-subtle">Tags</div>
        <div class="flex flex-wrap gap-1.5">
          ${badge('env: prod','accent')} ${badge('team: payments','neutral')} ${badge('app: checkout','neutral')}
        </div>
      </div>
    </div>`;

  // ----------------------------------------------------------------------------
  // Render lucide icons, then expose the deterministic timeline.
  // ----------------------------------------------------------------------------
  lucide.createIcons();

  // store path lengths for draw animation
  const lines = [...document.querySelectorAll('.spark-line')];
  lines.forEach(p=>{ try{ p.dataset.len = p.getTotalLength(); }catch(e){ p.dataset.len = 400; } });
  const areas = [...document.querySelectorAll('.spark-area')];

  const THEME_DARK = {
    '--bg':[9,11,16],'--bg-elevated':[13,17,24],'--surface':[17,22,30],'--surface-2':[22,28,38],
    '--surface-hover':[28,35,47],'--border':[31,39,51],'--border-strong':[46,57,74],
    '--fg':[232,237,243],'--fg-muted':[148,161,178],'--fg-subtle':[99,112,130],
    '--accent':[56,189,248],'--accent-hover':[125,211,252],'--accent-fg':[8,14,22],'--accent-soft':[12,33,47],
    '--violet':[34,211,238],'--ok':[52,199,142],'--ok-soft':[16,44,36],'--warn':[240,184,64],'--warn-soft':[48,39,16],
    '--error':[244,99,110],'--error-soft':[52,24,30],'--info':[96,165,250],'--info-soft':[17,33,54]
  };
  const THEME_LIGHT = {
    '--bg':[246,248,250],'--bg-elevated':[255,255,255],'--surface':[255,255,255],'--surface-2':[246,248,251],
    '--surface-hover':[237,242,247],'--border':[226,230,236],'--border-strong':[202,209,219],
    '--fg':[16,24,39],'--fg-muted':[90,103,122],'--fg-subtle':[139,150,166],
    '--accent':[2,132,199],'--accent-hover':[3,105,161],'--accent-fg':[255,255,255],'--accent-soft':[224,242,254],
    '--violet':[8,145,178],'--ok':[21,145,101],'--ok-soft':[223,244,235],'--warn':[173,119,18],'--warn-soft':[250,242,222],
    '--error':[214,56,71],'--error-soft':[251,231,233],'--info':[37,99,235],'--info-soft':[225,237,255]
  };

  const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
  const inv=(t,a,b)=> clamp((t-a)/(b-a),0,1);
  const easeIO=x=> x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2;
  const easeOut=x=>1-Math.pow(1-x,3);
  const lerp=(a,b,p)=>a+(b-a)*p;

  const scroll = document.getElementById('scroll');
  const page = document.getElementById('page');
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('overlay');
  const cursor = document.getElementById('cursor');
  const pulse = document.getElementById('pulse');
  const tileEls = [...document.querySelectorAll('[data-tile]')];
  let SCROLL_MAX = 0;

  const DURATION = 16.8;

  function applyTheme(p){ // 0 dark -> 1 light
    const r = document.documentElement;
    for(const k in THEME_DARK){
      const d=THEME_DARK[k], l=THEME_LIGHT[k];
      r.style.setProperty(k, `${Math.round(lerp(d[0],l[0],p))} ${Math.round(lerp(d[1],l[1],p))} ${Math.round(lerp(d[2],l[2],p))}`);
    }
  }

  function scrollNorm(t){
    if(t<2.2) return 0;
    if(t<3.2) return easeIO(inv(t,2.2,3.2))*0.13;
    if(t<7.0) return 0.13;                                  // hold during drawer
    if(t<11.0) return lerp(0.13,1,easeIO(inv(t,7.0,11.0))); // reveal everything
    if(t<11.7) return 1;
    if(t<12.7) return lerp(1,0,easeIO(inv(t,11.7,12.7)));
    return 0;
  }
  function drawerNorm(t){
    if(t<2.9) return 0;
    if(t<3.6) return easeIO(inv(t,2.9,3.6));
    if(t<6.3) return 1;
    if(t<6.9) return 1-easeIO(inv(t,6.3,6.9));
    return 0;
  }
  function themeNorm(t){
    if(t<12.9) return 0;
    if(t<13.7) return easeIO(inv(t,12.9,13.7));
    if(t<15.2) return 1;
    if(t<16.0) return 1-easeIO(inv(t,15.2,16.0));
    return 0;
  }

  function seek(t){
    t = clamp(t,0,DURATION);
    if(SCROLL_MAX<=0){ SCROLL_MAX = Math.max(0, page.scrollHeight - scroll.clientHeight + 16); }

    // intro fade/rise
    const intro = easeOut(inv(t,0,0.55));
    document.getElementById('app').style.opacity = intro;
    document.getElementById('app').style.transform = `translateY(${lerp(8,0,intro)}px)`;

    // count-up tiles
    const cu = easeOut(inv(t,0.3,1.7));
    tileEls.forEach((n,i)=>{ n.textContent = Math.round(TILES[i].target*cu).toLocaleString('en-US'); });

    // chart draw
    const dp = easeIO(inv(t,1.1,3.0));
    lines.forEach(p=>{ const len=+p.dataset.len; p.style.strokeDasharray=len; p.style.strokeDashoffset=len*(1-dp); });
    areas.forEach(a=>{ a.style.opacity = dp; });

    // scroll
    page.style.transform = `translateY(${(-scrollNorm(t)*SCROLL_MAX).toFixed(1)}px)`;

    // drawer + overlay
    const dn = drawerNorm(t);
    drawer.style.transform = `translateX(${((1-dn)*100).toFixed(2)}%)`;
    overlay.style.opacity = (dn*0.45).toFixed(3);

    // cursor: glide toward a Lambda row, click pulse as the drawer opens
    if(t>1.7 && t<6.4){
      const ce = easeIO(inv(t,1.7,2.9));
      const cx = lerp(960, 470, ce), cy = lerp(150, 392, ce);
      cursor.style.opacity = clamp(inv(t,1.7,2.1),0,1) * clamp(1-inv(t,6.0,6.4),0,1);
      cursor.style.transform = `translate(${cx}px, ${cy}px)`;
      // pulse ring at click moment (~2.9s)
      const pr = inv(t,2.85,3.45);
      if(pr>0 && pr<1){ const r=lerp(4,34,pr); pulse.style.left=cx+'px'; pulse.style.top=cy+'px';
        pulse.style.width=r*2+'px'; pulse.style.height=r*2+'px'; pulse.style.opacity=(1-pr)*0.9; }
      else pulse.style.opacity=0;
    } else { cursor.style.opacity=0; pulse.style.opacity=0; }

    // theme crossfade
    applyTheme(themeNorm(t));
    // header icon swap (sun in dark, moon in light) — purely cosmetic
  }

  window.__seek = seek;
  window.__DURATION = DURATION;
  // signal readiness after a layout + paint settle
  requestAnimationFrame(()=>{ seek(0); requestAnimationFrame(()=>{ setTimeout(()=>{ window.__ready = true; }, 60); }); });
  </script>
</body>
</html>
